<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ctrl One^ — Manifesto</title>
<style>

/* ── FONTS ── */
@font-face {
  font-family: 'PPNeueMontreal';
  src: url('Assets/Fonts/pp-neue-montreal-cufonfonts copy/ppneuemontreal-medium.otf') format('opentype');
  font-weight: 500; font-style: normal;
}
@font-face {
  font-family: 'PPNeueMontreal';
  src: url('Assets/Fonts/pp-neue-montreal-cufonfonts copy/ppneuemontreal-book.otf') format('opentype');
  font-weight: 400; font-style: normal;
}

/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: #f0efe9;
  font-family: 'PPNeueMontreal', 'Helvetica Neue', sans-serif;
}

/* ── NAV ── */
#main-nav {
  position: fixed;
  top: 0; left: 0; right: 0; height: 58px;
  display: flex; align-items: center;
  justify-content: center; gap: 52px;
  z-index: 30;
  background: #f0efe9; /* solid so scrolling text disappears cleanly beneath it */
}
.nav-btn {
  background: none; border: none; cursor: pointer;
  font-family: 'PPNeueMontreal', sans-serif;
  font-size: 10px; font-weight: 400;
  letter-spacing: 0.26em; text-transform: uppercase;
  color: rgba(0,0,0,0.45);
  padding: 8px 4px; transition: color 0.2s;
}
.nav-btn:hover  { color: rgba(0,0,0,0.85); }
.nav-btn.active { color: rgba(0,0,0,0.85); pointer-events: none; }
#nav-logo {
  height: 38px; width: auto; display: block; cursor: pointer;
  filter: invert(1) opacity(0.55); transition: filter 0.2s;
}
#nav-logo:hover { filter: invert(1) opacity(0.9); }

/* ── SCROLL STAGE ── */
#stage {
  position: fixed;
  top: 58px; left: 0; right: 0; bottom: 0;
  overflow: hidden;
}

/* ── SCROLLING TRACK ──
   Two identical PNGs stacked. Animating to -50% of total height
   = exactly one image height. At that point the loop resets to 0
   and the second copy is in the same position the first started at
   → seamless infinite scroll, zero JavaScript needed.           */
#scroller {
  display: block;
  text-align: center;
  animation: roll 105s linear infinite;
}

@keyframes roll {
  from { transform: translateY(0); }
  to   { transform: translateY(-50%); }
}

#scroller img {
  display: block;
  width: 100%;
  height: auto;
}

/* ── FADE MASKS — top & bottom ──
   The solid band at the very edge means the nav area blends
   seamlessly into the scroll; the soft gradient below it lets
   text dissolve in/out, giving the "infinite" credit-roll feel. */
#fade-top, #fade-bottom {
  position: absolute; left: 0; right: 0;
  pointer-events: none; z-index: 10;
}
#fade-top {
  top: 0; height: 32%;
  background: linear-gradient(
    to bottom,
    #f0efe9 0%,
    #f0efe9 12%,
    rgba(240,239,233,0) 100%
  );
}
#fade-bottom {
  bottom: 0; height: 32%;
  background: linear-gradient(
    to top,
    #f0efe9 0%,
    #f0efe9 12%,
    rgba(240,239,233,0) 100%
  );
}

/* ── VIDEO INTERRUPT ── */
#vid-interrupt {
  position: fixed;
  inset: 0;
  z-index: 100;          /* above nav and scroll */
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.7s ease;
}
#vid-interrupt.visible {
  opacity: 1;
  pointer-events: auto;
}
#vid-interrupt video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
#vid-exit {
  position: absolute;
  top: 22px; right: 24px;
  background: none; border: none; cursor: pointer;
  font-family: 'PPNeueMontreal', sans-serif;
  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,0.18);
  padding: 8px 4px;
  z-index: 1;
  transition: color 0.2s;
}
#vid-exit:hover { color: rgba(255,255,255,0.65); }

</style>
</head>
<body>

<nav id="main-nav">
  <button class="nav-btn" onclick="history.back()">Projects</button>
  <img id="nav-logo" src="Assets/Main Page/Logo.png" alt="Ctrl One"
       onclick="window.location.href='index.html'">
  <button class="nav-btn active">Manifesto</button>
</nav>

<!-- Video interrupt overlay -->
<div id="vid-interrupt">
  <video id="vid-main"
         src="Assets/Main%20Page/Video%20Ctrl%20One%20V2_1.mp4"
         playsinline
         preload="auto">
  </video>
  <button id="vid-exit" onclick="hideInterrupt()">Close ×</button>
</div>

<div id="stage">
  <!-- Fade masks sit on top of the scroller -->
  <div id="fade-top"></div>
  <div id="fade-bottom"></div>

  <!-- Two copies → seamless loop when animation resets at -50% -->
  <div id="scroller">
    <img src="Assets/Main Page/Manifesto.png" alt="Manifesto">
    <img src="Assets/Main Page/Manifesto.png" alt="">
  </div>
</div>

<script>
// ── Escape returns to previous page (unless video is showing) ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const overlay = document.getElementById('vid-interrupt');
    if (overlay.classList.contains('visible')) { hideInterrupt(); return; }
    history.back();
  }
});

// ── Video interrupt ──
const interruptEl = document.getElementById('vid-interrupt');
const vidMain     = document.getElementById('vid-main');
let interruptShown = false;

function showInterrupt() {
  if (interruptShown) return;
  interruptShown = true;
  interruptEl.classList.add('visible');
  vidMain.currentTime = 0;
  vidMain.play().catch(() => {});
}

function hideInterrupt() {
  interruptEl.classList.remove('visible');
  vidMain.pause();
  vidMain.currentTime = 0;
}

// After video ends, fade it away
vidMain.addEventListener('ended', hideInterrupt);

// Trigger after 20 seconds
setTimeout(showInterrupt, 20000);
</script>
</body>
</html>
