<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ctrl One^</title>
<style>

/* ── FONTS ── */
@font-face {
  font-family: 'PPNeueMontreal';
  src: url('Assets/Fonts/pp-neue-montreal-cufonfonts copy/ppneuemontreal-book.otf') format('opentype');
  font-weight: 400; font-style: normal;
}
@font-face {
  font-family: 'PPNeueMontreal';
  src: url('Assets/Fonts/pp-neue-montreal-cufonfonts copy/ppneuemontreal-medium.otf') format('opentype');
  font-weight: 500; font-style: normal;
}

/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: #000;
  font-family: 'PPNeueMontreal', 'Helvetica Neue', sans-serif;
}

/* ── CAMERA ── */
#video {
  position: fixed;
  top: 50%; left: 50%;
  min-width: 100%; min-height: 100%;
  width: auto; height: auto;
  transform: translate(-50%, -50%) scaleX(-1);
  object-fit: cover;
  z-index: 1;
}

/* ── TOP GRADIENT — helps white text read over bright camera feed ── */
#top-gradient {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 220px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.38) 0%, rgba(0,0,0,0) 100%);
  z-index: 2;
  pointer-events: none;
}

/* ── SIDE GRADIENTS — helps arrows read over bright camera feed ── */
#left-gradient, #right-gradient {
  position: fixed;
  top: 0; bottom: 0;
  width: 180px;
  background: linear-gradient(to right, rgba(0,0,0,0.32) 0%, rgba(0,0,0,0) 100%);
  z-index: 2;
  pointer-events: none;
}
#left-gradient  { left: 0; }
#right-gradient { right: 0; transform: scaleX(-1); }

/* ── NAVIGATION ── */
#main-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 52px;
  z-index: 30;
  pointer-events: none;
}
.nav-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'PPNeueMontreal', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.72);
  padding: 8px 4px;
  pointer-events: auto;
  transition: color 0.2s;
}
.nav-btn:hover { color: #fff; }
#nav-logo {
  height: 42px;
  width: auto;
  display: block;
  pointer-events: none;
  /* Logo.png is white on transparent */
}

/* ── DOTS ── */
#project-dots {
  position: fixed;
  top: 26px; right: 24px;
  display: flex; align-items: center; gap: 6px;
  pointer-events: none; z-index: 30;
}
.proj-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.22);
  transition: all 0.3s;
}
.proj-dot.active {
  background: rgba(255,255,255,0.9);
  width: 9px; height: 9px;
}

/* ── PERSON LABELS ── */
#labels-container {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 15;
  pointer-events: none;
}

.person-label {
  position: absolute;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: auto;
  /* opacity fade handled via JS; position via JS lerp — no CSS position transition */
  transition: opacity 0.35s ease;
}

/* ── CARD (floats above or below name tag on hover) ── */
.card-wrapper {
  display: none;  /* shown via JS .visible class */
  flex-direction: column;
  align-items: stretch;
  width: 320px;
  background: #fff;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  position: absolute;
  bottom: calc(100% + 10px);   /* default: above the name tag */
  left: 50%;
  transform: translateX(-50%);
  pointer-events: auto;
}
.card-wrapper.visible { display: flex; }

/* When name tag is in the upper screen half, card opens BELOW instead */
.person-label.card-below .card-wrapper {
  bottom: auto;
  top: calc(100% + 10px);
}

/* Video inside the card */
.card-video {
  width: 100%;
  height: 190px;
  object-fit: cover;
  display: block;
}

.card-btn {
  display: block;
  width: 100%;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-align: center;
  padding: 13px 6px;
  color: #111;
  background: #efefed;
  font-family: 'PPNeueMontreal', sans-serif;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.card-btn:hover { background: #111; color: #fff; }

/* ── NAME TAG (PNG badge) ── */
.name-tag-img {
  display: block;
  max-width: 320px;
  height: auto;
  pointer-events: none;
}

/* ── VERTICAL LINE TO PERSON ── */
.label-line {
  width: 1px;
  height: 38px;
  background: rgba(255,255,255,0.28);
}

/* ══════════════════════════════════════════════
   PROJECTS CAROUSEL OVERLAY
══════════════════════════════════════════════ */
#projects-overlay {
  position: fixed;
  inset: 0;
  background: rgba(6,6,6,0.93);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 100;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
#projects-overlay.open { display: flex; }

/* Top/bottom fade gradients inside the projects overlay */
#overlay-fade-top, #overlay-fade-bottom {
  position: absolute; left: 0; right: 0;
  pointer-events: none; z-index: 5;
}
#overlay-fade-top {
  top: 0; height: 160px;
  background: linear-gradient(to bottom, rgba(6,6,6,0.85) 0%, rgba(6,6,6,0) 100%);
}
#overlay-fade-bottom {
  bottom: 0; height: 160px;
  background: linear-gradient(to top, rgba(6,6,6,0.85) 0%, rgba(6,6,6,0) 100%);
}

/* Close button — replaces dots top-right when overlay is open */
#carousel-close {
  position: fixed;
  top: 24px; right: 24px;
  background: none; border: none;
  cursor: pointer;
  font-family: 'PPNeueMontreal', sans-serif;
  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  z-index: 110;
  display: none;
  transition: color 0.2s;
}
#carousel-close:hover { color: rgba(255,255,255,0.9); }

/* 3-D wheel stage */
#carousel-stage {
  perspective: 1200px;
  perspective-origin: 50% 50%;
  width: 100%;
  height: 60vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* The rotating wheel — children are positioned around it */
#carousel-wheel {
  transform-style: preserve-3d;
  position: relative;
  width: 380px;
  height: 0;   /* cards use margin-top to center on this 0-height baseline */
  transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* Individual project card on the wheel */
.carousel-card {
  position: absolute;
  width: 380px;
  height: 240px;
  /* backface-visibility NOT used — cards at 90° and 270° (indices 2 & 6)
     are treated as back-facing by Chrome and permanently hidden.
     Visibility is managed in JS instead. */
  cursor: pointer;
  margin-top: -120px;  /* center vertically on the wheel baseline */
  overflow: hidden;
  transition: opacity 0.3s;
  /* JS sets: transform: rotateX(Ndeg) translateZ(Rpx) */
}

.carousel-card video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
}

/* Name overlay — appears on hover of the FRONT card only */
.carousel-name-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.72);
  opacity: 0;
  transition: opacity 0.22s;
  pointer-events: none;
}
/* Overlay visibility driven by JS mouseenter/mouseleave (not CSS :hover)
   to avoid 3D hit-test glitches for cards coming from edge-on angles */
.carousel-name-overlay.visible { opacity: 1; }
.carousel-name-overlay span {
  font-family: 'PPNeueMontreal', sans-serif;
  font-weight: 500;           /* medium */
  font-size: 15px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #fff;
  text-align: center;
  padding: 0 24px;
}

/* Triangle centered below the front card position */
#carousel-triangle-wrap {
  margin-top: 6px;
  pointer-events: none;
}
#carousel-triangle-img {
  width: 14px;
  height: auto;
  display: block;
  filter: invert(1);
  opacity: 0.5;
}

/* Hint: scroll to browse */
#carousel-hint {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%);
  font-family: 'PPNeueMontreal', sans-serif;
  font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,0.2);
  pointer-events: none;
}

/* ── PROJECT NAV ARROWS (manual / no-person mode) ── */
.proj-nav-arrow {
  position: fixed; top: 50%;
  transform: translateY(-50%);
  z-index: 20;
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.35);
  font-size: 20px; padding: 24px 18px;
  transition: color 0.15s, opacity 0.3s;
  opacity: 0; pointer-events: none;
}
.proj-nav-arrow:hover { color: rgba(255,255,255,0.9); }
.proj-nav-arrow.visible { opacity: 1; pointer-events: auto; }
#proj-prev { left: 18px; }
#proj-next { right: 18px; }

/* ── LOADING STATUS ── */
#status {
  position: fixed; inset: 0;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 200;
  transition: opacity 0.8s ease;
}
#status.hidden { opacity: 0; pointer-events: none; }
#status-text {
  color: rgba(255,255,255,0.42);
  font-size: 11px; letter-spacing: 0.24em;
  text-transform: uppercase; margin-bottom: 20px;
}
#loading-bar { width: 160px; height: 1px; background: rgba(255,255,255,0.1); }
#loading-progress { height: 100%; background: rgba(255,255,255,0.42); width: 0%; transition: width 0.3s; }

</style>
</head>
<body>

<!-- Camera feed -->
<video id="video" autoplay muted playsinline></video>

<!-- Top gradient overlay for text legibility -->

<!-- Side gradient overlays for arrow legibility -->
<div id="left-gradient"></div>
<div id="right-gradient"></div>

<!-- Navigation -->
<nav id="main-nav">
  <button class="nav-btn" id="nav-projects" onclick="openProjects()">Projects</button>
  <img id="nav-logo" src="Assets/Main Page/Logo.png" alt="Ctrl One">
  <button class="nav-btn" id="nav-manifesto" onclick="openManifesto()">Manifesto</button>
</nav>

<!-- Dots (8 projects) -->
<div id="project-dots">
  <div class="proj-dot" id="dot-1"></div>
  <div class="proj-dot" id="dot-2"></div>
  <div class="proj-dot" id="dot-3"></div>
  <div class="proj-dot" id="dot-4"></div>
  <div class="proj-dot" id="dot-5"></div>
  <div class="proj-dot" id="dot-6"></div>

  <div class="proj-dot" id="dot-8"></div>
</div>

<!-- Projects wheel overlay -->

  <div id="overlay-fade-top"></div>

    <div id="carousel-wheel"></div>
  </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
// ──────────────────────────────────────────────────────────
//  PROJECT DATA
//  Name mapping (confirmed):
//    ButterBun_NameTag  = Carcasa project
//    Casper_NameTag     = Teléfono Invisible project
// ──────────────────────────────────────────────────────────
// sp() encodes only spaces — accented chars are left raw so the browser
// handles them natively (encodeURIComponent over-encodes on macOS Live Server)
const sp = s => s.replace(/ /g, '%20');
const CARD_BASE = 'Assets/Cards/Card%20Videos_New/';
const SPEC_BASE = 'Assets/Cards/Names/';
const NTAG_BASE = 'Assets/Name Tags/';

const PROJECTS = [
  {
    id: 1, name: 'Narciso',
    nameTag:   NTAG_BASE + 'Narciso_NameTag.png',
    cardVideo: CARD_BASE + 'Card_Narciso.mp4',
    specImg:   SPEC_BASE + 'Spec_Narciso.png',
    proyectoUrl: 'projects/narciso.html'
  },
  {
    id: 2, name: 'Casper',
    nameTag:   NTAG_BASE + 'Casper_NameTag.png',
    cardVideo: CARD_BASE + 'Card_Casper.mp4',
    specImg:   SPEC_BASE + 'Spec_Teléfono.png',
    proyectoUrl: 'projects/casper.html'
  },
  {
    id: 3, name: '3rd Person',
    nameTag:   NTAG_BASE + '3rdPerson_NameTag.png',
    cardVideo: CARD_BASE + 'Card_3rdPerson.mp4',
    specImg:   SPEC_BASE + sp('Spec_3ª Persona.png'),
    proyectoUrl: 'projects/3rdperson.html'
  },
  {
    id: 4, name: 'Human Battery',
    nameTag:   NTAG_BASE + 'HumanBattery_NameTag.png',
    cardVideo: CARD_BASE + 'Card_HumanBattery.mp4',
    specImg:   SPEC_BASE + sp('Spec_Batería Humana.png'),
    proyectoUrl: 'projects/humanbattery.html'
  },
  {
    id: 5, name: 'Butter Bun',
    nameTag:   NTAG_BASE + 'ButterBun_NameTag.png',
    cardVideo: CARD_BASE + 'Card_ButterBun.mp4',
    specImg:   SPEC_BASE + 'Spec_Carcasa.png',
    proyectoUrl: 'projects/butterbun.html'
  },
  {
    id: 6, name: 'UFO',
    nameTag:   NTAG_BASE + 'UFO_NameTag.png',
    cardVideo: CARD_BASE + 'Card_UFO.mp4',
    specImg:   SPEC_BASE + 'Spec_UFO.png',
    proyectoUrl: 'projects/ufo.html'
  },
  {
    id: 7, name: 'Atalaya',
    nameTag:   NTAG_BASE + 'Atalaya_NameTag.png',
    cardVideo: CARD_BASE + 'Card_Atalaya.mp4',
    specImg:   SPEC_BASE + 'Spec_Atalaya.png',
    proyectoUrl: 'projects/atalaya.html'
  },
  {
    id: 8, name: 'Two Toilets',
    nameTag:   NTAG_BASE + 'TwoToilets_NameTag.png',
    cardVideo: CARD_BASE + 'Card_TwoToilets.mp4',
    specImg:   SPEC_BASE + sp('Spec_Dos Inodoros.png'),
    proyectoUrl: 'projects/twotoilets.html'
  }
];

// ──────────────────────────────────────────────────────────
//  3-D CAROUSEL
//  8 cards arranged on a horizontal cylinder (rotates on X axis).
//  Scroll or arrow keys to spin. Front card plays video on hover.
// ──────────────────────────────────────────────────────────
const CARD_W = 380;
const CARD_H = 240;
const N = PROJECTS.length;                          // 8
const ANGLE_STEP = 360 / N;                         // 45°
const RADIUS = Math.round((CARD_H / 2) / Math.tan(Math.PI / N)) + 90; // ~400px

let carouselIdx = 0;     // which project is at the front
let wheelRotation = 0;   // cumulative degrees — grows continuously so each step is always ±45°
let carouselBuilt = false;

function buildCarousel() {
  if (carouselBuilt) return;
  carouselBuilt = true;

  const wheel = document.getElementById('carousel-wheel');
  PROJECTS.forEach((proj, i) => {
    const card = document.createElement('div');
    card.className = 'carousel-card';
    card.dataset.idx = i;

    const angleDeg = i * ANGLE_STEP;
    card.style.transform = `rotateX(${angleDeg}deg) translateZ(${RADIUS}px)`;

    // Video element
    const vid = document.createElement('video');
    vid.src = proj.cardVideo;
    vid.muted = true; vid.loop = true; vid.playsInline = true;
    vid.preload = 'metadata';

    // Name overlay — PP Neue Montreal Medium, full caps, shown on hover of front card
    const overlay = document.createElement('div');
    overlay.className = 'carousel-name-overlay';
    const nameSpan = document.createElement('span');
    nameSpan.textContent = proj.name.toUpperCase();
    overlay.appendChild(nameSpan);

    card.appendChild(vid);
    card.appendChild(overlay);

    // Click → open project
    card.addEventListener('click', () => {
      if (proj.proyectoUrl && proj.proyectoUrl !== '#') {
        window.location.href = proj.proyectoUrl;
      }
    });

    wheel.appendChild(card);
  });

  // Hover detection via geometry — track last mouse position so we can
  // re-evaluate after a spin without needing the user to move the mouse.
  const stage = document.getElementById('carousel-stage');
  let _mouseX = -9999, _mouseY = -9999;
  function _checkFrontHover() {
    const r = stage.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const on = Math.abs(_mouseX - cx) < 190 && Math.abs(_mouseY - cy) < 120;
    const front = document.querySelector('.carousel-card.is-front');
    if (!front) return;
    const ov = front.querySelector('.carousel-name-overlay');
    if (on) ov.classList.add('visible');
    else ov.classList.remove('visible');
  }
  stage.addEventListener('mousemove', (e) => {
    _mouseX = e.clientX; _mouseY = e.clientY;
    _checkFrontHover();
  });
  stage.addEventListener('mouseleave', () => {
    _mouseX = -9999; _mouseY = -9999;
    const front = document.querySelector('.carousel-card.is-front');
    if (front) front.querySelector('.carousel-name-overlay').classList.remove('visible');
  });
  window._checkCarouselHover = _checkFrontHover;

  updateCarouselFront();
}

function spinCarousel(dir) {
  carouselIdx = (carouselIdx + dir + N) % N;
  // Always move exactly one ANGLE_STEP — never recalculate from index
  // (recalculating would jump 315° when wrapping 0→7 instead of just 45°)
  wheelRotation -= dir * ANGLE_STEP;
  document.getElementById('carousel-wheel').style.transform = `rotateX(${wheelRotation}deg)`;
  updateCarouselFront();
}

function updateCarouselFront() {
  document.querySelectorAll('.carousel-card').forEach((card, i) => {
    const front = (i === carouselIdx);
    card.classList.toggle('is-front', front);

    // Angular distance from front: 0 = front, N/2 = directly behind
    const diff = ((i - carouselIdx) % N + N) % N;
    const angularDist = diff > N / 2 ? N - diff : diff; // 0 … N/2

    // Show cards within ±45° (distance < 2 steps); hide edge-on cards at
    // exactly 90° / 270° — they appear as thin lines and are unclickable.
    const visible = angularDist < N / 4;
    card.style.opacity = visible ? '1' : '0';
    card.style.pointerEvents = visible ? '' : 'none';

    const v = card.querySelector('video');
    if (front) {
      if (v) v.play().catch(() => {});
    } else {
      if (v) { v.pause(); v.currentTime = 0; }
      const ov = card.querySelector('.carousel-name-overlay');
      if (ov) ov.classList.remove('visible');
    }
  });
  if (window._checkCarouselHover) window._checkCarouselHover();
}

function openProjects() {
  buildCarousel();
  document.getElementById('projects-overlay').classList.add('open');
  document.getElementById('carousel-close').style.display = 'block';
  document.getElementById('project-dots').style.opacity = '0';
  showProjArrows(false);
}

function closeProjects() {
  document.getElementById('projects-overlay').classList.remove('open');
  document.getElementById('carousel-close').style.display = 'none';
  document.getElementById('project-dots').style.opacity = '1';
  document.querySelectorAll('.carousel-card video').forEach(v => {
    v.pause(); v.currentTime = 0;
  });
  // Restore arrows if we're in manual (no-person) mode
  if (manualLabelEl) showProjArrows(true);
}

function openManifesto() {
  window.location.href = 'manifesto.html';
}

// ── Manual-mode arrow navigation ──
function showProjArrows(show) {
  const prev = document.getElementById('proj-prev');
  const next = document.getElementById('proj-next');
  if (prev) prev.classList.toggle('visible', show);
  if (next) next.classList.toggle('visible', show);
}

function cycleManualProject(dir) {
  manualProjIdx = (manualProjIdx + dir + N) % N;

  if (trackedPersons.length === 1) {
    // One person in frame — swap their project assignment and rebuild their label
    const trackId = trackedPersons[0].id;
    removeLabel(trackId);
    assignedProjects[trackId] = PROJECTS[manualProjIdx % N];
    updatePersonLabel(trackedPersons[0]);
    updateDots(PROJECTS[manualProjIdx % N].id);
  } else {
    // Manual mode (no person) — cycle the manual label
    if (manualLabelEl) { manualLabelEl.remove(); manualLabelEl = null; }
    renderManualLabel();
  }
}

// Scroll to spin carousel — debounced so one swipe = one step
let lastSpin = 0;
const SPIN_COOLDOWN = 650; // ms — matches CSS transition duration

document.getElementById('projects-overlay').addEventListener('wheel', e => {
  e.preventDefault();
  const now = Date.now();
  if (now - lastSpin < SPIN_COOLDOWN) return;
  lastSpin = now;
  spinCarousel(e.deltaY > 0 ? -1 : 1);  // scroll down = bottom rises to centre
}, { passive: false });

// Keyboard — same cooldown
document.addEventListener('keydown', e => {
  const open = document.getElementById('projects-overlay').classList.contains('open');
  if (!open) return;
  if (e.key === 'Escape') { closeProjects(); return; }
  const now = Date.now();
  if (now - lastSpin < SPIN_COOLDOWN) return;
  lastSpin = now;
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') spinCarousel(1);
  if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  spinCarousel(-1);
});

// ──────────────────────────────────────────────────────────
//  DOTS
// ──────────────────────────────────────────────────────────
function updateDots(projId) {
  for (let i = 1; i <= N; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.classList.toggle('active', i === projId);
  }
}

// ──────────────────────────────────────────────────────────
//  PERSON LABELS — name tag PNG + card on click
// ──────────────────────────────────────────────────────────
let personLabels    = {};   // { trackId: { el, proj, displayX, displayY } }
let assignedProjects = {};  // { trackId: project }
let manualLabelEl   = null;
let manualProjIdx   = 0;

function getProject(trackId) {
  if (!assignedProjects[trackId]) {
    // Person 1 gets manualProjIdx (so arrows feel connected to who's in frame).
    // Each additional person gets the next slot so multiple projects show at once.
    const offset = Object.keys(assignedProjects).length;
    assignedProjects[trackId] = PROJECTS[(manualProjIdx + offset) % N];
  }
  return assignedProjects[trackId];
}

function createLabelEl(proj) {
  const el = document.createElement('div');
  el.className = 'person-label';
  el.style.opacity = '0';

  // Card (floats above/below name tag, toggled by clicking the name tag)
  const card = document.createElement('div');
  card.className = 'card-wrapper';

  // Video from Card Videos folder
  const cardVid = document.createElement('video');
  cardVid.className = 'card-video';
  cardVid.src = proj.cardVideo;
  cardVid.muted = true; cardVid.loop = true; cardVid.playsInline = true;
  cardVid.preload = 'metadata';
  card.appendChild(cardVid);

  // "Open Project" button — only render if a real URL exists
  if (proj.proyectoUrl && proj.proyectoUrl !== '#') {
    const btn = document.createElement('a');
    btn.className = 'card-btn';
    btn.textContent = 'Open Project';
    btn.href = proj.proyectoUrl;
    card.appendChild(btn);
  }

  // Name tag PNG — clicking this toggles the card
  const ntag = document.createElement('img');
  ntag.className = 'name-tag-img';
  ntag.src = proj.nameTag;
  ntag.alt = proj.name;

  // Vertical line to person
  const line = document.createElement('div');
  line.className = 'label-line';

  el.appendChild(card);
  el.appendChild(ntag);
  el.appendChild(line);

  // ── Hover on name tag opens card; click "Open Project" to navigate ──
  // (href="#" buttons are gone so hover is safe — no accidental reloads)
  let hideTimer = null;
  const openCard = () => {
    clearTimeout(hideTimer);
    card.classList.add('visible');
    cardVid.play().catch(() => {});
  };
  const schedClose = () => {
    hideTimer = setTimeout(() => {
      card.classList.remove('visible');
      cardVid.pause(); cardVid.currentTime = 0;
    }, 600);
  };

  // Hover anywhere on the label (name tag area) opens card
  // Events go on `el` not `ntag` because ntag has pointer-events:none in CSS
  el.addEventListener('mouseenter', openCard);
  el.addEventListener('mouseleave', schedClose);

  // Card floats outside el's border-box → needs its own listeners
  card.addEventListener('mouseenter', openCard);
  card.addEventListener('mouseleave', schedClose);

  return el;
}

function removeLabel(trackId) {
  const entry = personLabels[trackId];
  if (entry) {
    entry.el.style.opacity = '0';
    setTimeout(() => { if (entry.el.parentNode) entry.el.remove(); }, 400);
    delete personLabels[trackId];
  }
  delete assignedProjects[trackId];
}

function updatePersonLabel(track) {
  const proj = getProject(track.id);
  let entry  = personLabels[track.id];

  const targetX = track.cx;
  const targetY = Math.max(140, track.top - 10);
  // Upper half of screen → card would go off-screen above → open below instead
  const inUpperHalf = targetY < window.innerHeight * 0.5;

  if (!entry) {
    const el = createLabelEl(proj);
    el.classList.toggle('card-below', inUpperHalf);
    document.getElementById('labels-container').appendChild(el);
    el.style.left = targetX + 'px';
    el.style.top  = targetY + 'px';
    personLabels[track.id] = { el, proj, displayX: targetX, displayY: targetY };
    requestAnimationFrame(() => { el.style.opacity = '1'; });
    return;
  }

  // Update card-below only when the card is not open (avoids jump while hovering)
  const cardEl = entry.el.querySelector('.card-wrapper');
  if (!cardEl.classList.contains('visible')) {
    entry.el.classList.toggle('card-below', inUpperHalf);
  }

  // ── Lerp display position toward detection target ──────
  entry.displayX += (targetX - entry.displayX) * 0.25;
  entry.displayY += (targetY - entry.displayY) * 0.25;
  entry.el.style.left = entry.displayX + 'px';
  entry.el.style.top  = entry.displayY + 'px';
}

function renderManualLabel() {
  if (manualLabelEl) return;
  const proj = PROJECTS[manualProjIdx % N];
  manualLabelEl = createLabelEl(proj);
  manualLabelEl.style.left = '50%';
  manualLabelEl.style.top  = '44%';
  // 44% is upper half → card opens below
  manualLabelEl.classList.add('card-below');
  document.getElementById('labels-container').appendChild(manualLabelEl);
  requestAnimationFrame(() => { manualLabelEl.style.opacity = '1'; });
  updateDots(proj.id);
  // Show ← → arrows so the user can browse projects
  const projOpen = document.getElementById('projects-overlay').classList.contains('open');
  if (!projOpen) showProjArrows(true);
}

// ──────────────────────────────────────────────────────────
//  COCO-SSD PERSON TRACKER
// ──────────────────────────────────────────────────────────
let videoEl, model;
let isRunning = false, frameCount = 0;
let trackedPersons = [], nextId = 0;

function dist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

function trackPersons(detections) {
  const now = Date.now();
  const vw  = videoEl.offsetWidth  || window.innerWidth;
  const vh  = videoEl.offsetHeight || window.innerHeight;
  const sx  = vw / (videoEl.videoWidth  || 1280);
  const sy  = vh / (videoEl.videoHeight || 720);

  const persons = detections
    .filter(d => d.class === 'person' && d.score > 0.45)
    .map(d => {
      const [x, y, w, h] = d.bbox;
      return {
        cx:     vw - (x + w / 2) * sx,   // mirror X (video is CSS-flipped)
        cy:     (y + h / 2) * sy,
        top:    y * sy,
        width:  w * sx,
        height: h * sy
      };
    });

  const THRESH = 150;
  const matched = new Set();

  // Match detections to existing tracks
  persons.forEach(p => {
    let bestId = null, bestD = Infinity;
    trackedPersons.forEach(t => {
      const d = dist({ x: t.cx, y: t.cy }, { x: p.cx, y: p.cy });
      if (d < bestD && d < THRESH) { bestD = d; bestId = t.id; }
    });

    if (bestId !== null && !matched.has(bestId)) {
      const t = trackedPersons.find(t => t.id === bestId);
      // Smooth track position (60% old, 40% new) to reduce jitter
      t.cx    = t.cx    * 0.6 + p.cx    * 0.4;
      t.cy    = t.cy    * 0.6 + p.cy    * 0.4;
      t.top   = t.top   * 0.6 + p.top   * 0.4;
      t.width = p.width; t.height = p.height;
      t.lastSeen = now;
      matched.add(bestId);
    } else {
      const id = nextId++;
      trackedPersons.push({ id, ...p, lastSeen: now });
      matched.add(id);
    }
  });

  // Expire stale tracks (not seen for 1.5 s)
  trackedPersons = trackedPersons.filter(t => {
    if (now - t.lastSeen > 1500) { removeLabel(t.id); return false; }
    return true;
  });

  if (trackedPersons.length > 0) {
    // Clear manual label if real person appears
    if (manualLabelEl) { manualLabelEl.remove(); manualLabelEl = null; }
    // Arrows visible for exactly 1 person, hidden for 2+
    const projOpen = document.getElementById('projects-overlay').classList.contains('open');
    showProjArrows(!projOpen && trackedPersons.length === 1);
    trackedPersons.forEach(t => updatePersonLabel(t));
    updateDots(getProject(trackedPersons[0].id).id);
  } else {
    // No person — clear person labels, show manual label
    Object.keys(personLabels).forEach(id => removeLabel(Number(id)));
    renderManualLabel();
  }
}

// ──────────────────────────────────────────────────────────
//  INIT & DETECT LOOP
// ──────────────────────────────────────────────────────────
async function init() {
  videoEl = document.getElementById('video');
  setStatus('Loading', 20);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    videoEl.srcObject = stream;
    await new Promise(r => videoEl.onloadedmetadata = r);
    videoEl.play();
  } catch(e) { console.warn('Camera unavailable:', e); }

  setStatus('Loading model', 60);
  model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
  setStatus('Ready', 100);

  setTimeout(() => {
    document.getElementById('status').classList.add('hidden');
    isRunning = true;
    detectLoop();
  }, 600);
}

function setStatus(t, p) {
  document.getElementById('status-text').textContent = t;
  document.getElementById('loading-progress').style.width = p + '%';
}

async function detectLoop() {
  if (!isRunning) return;
  frameCount++;
  if (frameCount % 3 === 0) {
    try {
      if (videoEl.readyState >= 2) {
        const preds = await model.detect(videoEl);
        trackPersons(preds);
      }
    } catch(e) {}
  }
  requestAnimationFrame(detectLoop);
}

window.addEventListener('load', init);
</script>

<!-- Project nav arrows — visible only in manual (no-person) mode -->
<button id="proj-prev" class="proj-nav-arrow" onclick="cycleManualProject(-1)">&#8592;</button>
<button id="proj-next" class="proj-nav-arrow" onclick="cycleManualProject(1)">&#8594;</button>

</body>
</html>
