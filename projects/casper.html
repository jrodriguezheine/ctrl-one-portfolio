  return BASE + item.file.split('').map(c => {

    if (c === '&')  return '%26';
    if (c === '?')  return '%3F';

// ─────────────────────────────────────────────
//  CANVAS VIDEOS — 4 videos
//  z-order: first rendered = bottom; last = top
// ─────────────────────────────────────────────
const CANVAS_VIDEOS = [
  { archiveIdx: 16, x: 1263, y:  198, w:  672, h:  837 }, // 017 What Are You Watching Today?
  { archiveIdx:  0, x: 1983, y:  201, w: 1497, h:  843 }, // 001 Peripheral View
  { archiveIdx: 11, x:  297, y:  612, w:  933, h:  525 }, // 012 Still There
  { archiveIdx:  1, x: 2493, y: 1968, w: 1197, h:  666 }, // 002 Dissolving Into Oblivion
];

// ─────────────────────────────────────────────
//  BUILD CANVAS
// ─────────────────────────────────────────────
let clickBlocked = false;

function buildCanvas() {
  const canvas = document.getElementById('canvas');

  LAYOUT.forEach(pos => {
    if (pos.isText) {
      const hot = document.createElement('div');
      hot.className = 'hotspot hotspot-text';
      hot.style.cssText = `left:${pos.x}px;top:${pos.y}px;width:${pos.w}px;height:${pos.h}px;`;
      hot.title = 'Click to read';
      hot.addEventListener('click', () => { if (!clickBlocked) openTextPopup(pos.text); });
      canvas.appendChild(hot);
    } else {
      const item = ARCHIVE[pos.idx];
      const hot = document.createElement('div');
      hot.className = 'hotspot';
      hot.style.cssText = `left:${pos.x}px;top:${pos.y}px;width:${pos.w}px;height:${pos.h}px;`;
      hot.title = item.num + '. ' + item.title;
      hot.addEventListener('click', () => { if (!clickBlocked) openLightbox(pos.idx); });
      canvas.appendChild(hot);
    }
  });
}

// ─────────────────────────────────────────────
//  BUILD CANVAS VIDEOS
// ─────────────────────────────────────────────
function buildCanvasVideos() {
  const canvas = document.getElementById('canvas');

  CANVAS_VIDEOS.forEach(({ archiveIdx, x, y, w, h }) => {
    const item = ARCHIVE[archiveIdx];

    const wrap = document.createElement('div');
    wrap.className = 'canvas-video-wrap';
    wrap.style.cssText =
      `left:${x}px;top:${y}px;width:${w}px;height:${h}px;` +
      `position:absolute;overflow:hidden;cursor:pointer;`;
    wrap.title = item.num + '. ' + item.title;

    const vid = document.createElement('video');
    vid.src         = url(item);
    vid.muted       = true;
    vid.loop        = true;
    vid.autoplay    = true;
    vid.playsInline = true;
    vid.style.cssText =
      'width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;';

    const tryPlay = () => vid.play().catch(() => {});
    vid.addEventListener('canplay',    tryPlay, { once: true });
    vid.addEventListener('loadeddata', tryPlay, { once: true });

    // Click = open archive lightbox (canvas video keeps playing)
    wrap.addEventListener('click', () => {
      if (!clickBlocked) openLightbox(archiveIdx);
    });

    wrap.appendChild(vid);
    canvas.appendChild(wrap);
  });
}

// ─────────────────────────────────────────────
//  FILMSTRIP
// ─────────────────────────────────────────────
function buildFilmstrip() {
  const strip = document.getElementById('filmstrip');
  ARCHIVE.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'fs-thumb';
    el.dataset.idx = i;

    if (item.type === 'video') {
      const v = document.createElement('video');
      v.src = url(item); v.muted = true; v.preload = 'metadata';
      el.appendChild(v);
    } else {
      const im = document.createElement('img');
      im.src = url(item); im.alt = item.title;
      el.appendChild(im);
    }

    const num = document.createElement('div');
    num.className = 'fs-num';
    num.textContent = item.num;
    el.appendChild(num);

    el.addEventListener('click', () => openLightbox(i));
    strip.appendChild(el);
  });
}

// ─────────────────────────────────────────────
//  IMAGE PRELOADER
// ─────────────────────────────────────────────
const preloaded = {};
function preloadAll() {
  ARCHIVE.forEach(item => {
    if (item.type === 'image') {
      const img = new Image();
      img.src = url(item);
      img.decode().catch(() => {});
      preloaded[item.num] = img;
    }
  });
}

// ─────────────────────────────────────────────
//  TEXT POPUP
// ─────────────────────────────────────────────
function openTextPopup(text) {
  document.getElementById('text-popup-content').textContent = text;
  document.getElementById('text-overlay').classList.add('open');
}
function closeTextPopup() {
  document.getElementById('text-overlay').classList.remove('open');
}

// ─────────────────────────────────────────────
//  ARCHIVE LIGHTBOX
// ─────────────────────────────────────────────
let lbIdx = 0;
let archiveView = null;

function openLightbox(idx) {
  archiveView = { x: camX, y: camY };
  const scale   = Math.max(window.innerWidth / CW, window.innerHeight / CH);
  const scaledW = CW * scale, scaledH = CH * scale;
  const ox = (window.innerWidth  - scaledW) / 2;
  const oy = (window.innerHeight - scaledH) / 2;
  const cv = document.getElementById('canvas');
  cv.style.transition      = 'transform 0.45s ease';
  cv.style.transformOrigin = 'top left';
  cv.style.transform       = `translate(${ox}px,${oy}px) scale(${scale})`;
  lbIdx = idx;
  document.getElementById('lightbox').classList.add('open');
  renderLb(false);
}

function closeLightbox() {
  const cv = document.getElementById('canvas');
  cv.style.transition      = 'transform 0.45s ease';
  cv.style.transformOrigin = 'top left';
  cv.style.transform       = `translate(${archiveView.x}px,${archiveView.y}px)`;
  setTimeout(() => { cv.style.transition = ''; archiveView = null; }, 460);
  closeFlipbook();
  document.getElementById('lightbox').classList.remove('open');
  const v = document.getElementById('lb-video');
  v.pause(); v.src = '';
}

function lbStep(dir) {
  lbIdx = (lbIdx + dir + ARCHIVE.length) % ARCHIVE.length;
  renderLb(true);
}

function renderLb(fade) {
  const item  = ARCHIVE[lbIdx];
  const lbImg = document.getElementById('lb-img');
  const lbVid = document.getElementById('lb-video');
  const FADE_MS = 150;

  document.getElementById('lb-counter').textContent =
    item.num + ' — ' + String(ARCHIVE.length).padStart(3,'0');
  document.getElementById('lb-caption').textContent =
    item.num + '.  ' + item.title.toUpperCase();

  lbVid.pause();
  closeFlipbook();

  if (item.type === 'flipbook') {
    const doSwap = () => {
      lbImg.style.display = 'none';
      lbVid.style.display = 'none';
      lbVid.src = '';
      openFlipbook(item);
    };
    if (fade) { lbImg.classList.add('fading'); setTimeout(doSwap, FADE_MS); }
    else doSwap();

  } else if (item.type === 'video') {
    const doSwap = () => {
      lbImg.style.display = 'none';
      lbVid.style.display = 'block';
      lbVid.src = url(item);
      lbVid.classList.remove('fading');
      lbVid.play().catch(() => {});
    };
    if (fade) { lbVid.classList.add('fading'); setTimeout(doSwap, FADE_MS); }
    else doSwap();

  } else {
    const cached = preloaded[item.num];
    const newSrc = cached ? cached.src : url(item);
    const decodeImg = cached || (() => {
      const img = new Image(); img.src = newSrc;
      preloaded[item.num] = img; return img;
    })();
    const decodePromise = decodeImg.decode().catch(() => {});

    const doSwap = async () => {
      lbVid.style.display = 'none';
      lbVid.src = '';
      lbImg.style.display = 'block';
      lbImg.src = newSrc;
      lbImg.alt = item.title;
      await decodePromise;
      lbImg.classList.remove('fading');
    };
    if (fade) { lbImg.classList.add('fading'); setTimeout(doSwap, FADE_MS); }
    else doSwap();
  }

  // Filmstrip sync
  document.querySelectorAll('.fs-thumb').forEach((el, i) => {
    el.classList.toggle('active', i === lbIdx);
  });
  const activeThumb = document.querySelector('.fs-thumb.active');
  if (activeThumb) activeThumb.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

// Close on backdrop click
document.getElementById('lb-stage').addEventListener('click', e => {
  if (e.target === document.getElementById('lb-stage')) closeLightbox();
});

// Keyboard
document.addEventListener('keydown', e => {
  const archiveOpen  = document.getElementById('lightbox').classList.contains('open');
  const textOpen     = document.getElementById('text-overlay').classList.contains('open');
  const projectsOpen = document.getElementById('projects-overlay').classList.contains('open');

  if (textOpen) { if (e.key === 'Escape') closeTextPopup(); return; }

  if (archiveOpen) {
    if (e.key === 'Escape') closeLightbox();
    if (ARCHIVE[lbIdx].type === 'flipbook') {
      if (e.key === 'ArrowLeft')  flipPage(-1);
      if (e.key === 'ArrowRight') flipPage(1);
    } else {
      if (e.key === 'ArrowLeft')  lbStep(-1);
      if (e.key === 'ArrowRight') lbStep(1);
    }
    return;
  }
  if (projectsOpen) {
    if (e.key === 'Escape') { closeProjects(); return; }
    const now = Date.now();
    if (now - lastProjSpin < PROJ_SPIN_CD) return;
    lastProjSpin = now;
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') spinProj(1);
    if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  spinProj(-1);
    return;
  }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
  keys[e.key] = true;
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ─────────────────────────────────────────────
//  FLIPBOOK VIEWER  (PNG images)
// ─────────────────────────────────────────────
let fbPages = 0, fbPage = 0, fbBase = '';

function openFlipbook(item) {
  fbBase  = BASE + item.file;
  fbPages = item.pages;
  fbPage  = 0;
  document.getElementById('lb-img').style.display   = 'none';
  document.getElementById('lb-video').style.display = 'none';
  document.getElementById('lb-pdf-wrap').classList.add('active');
  document.getElementById('lb-center').classList.add('pdf-mode');
  renderFlipPage(false);
}

function closeFlipbook() {
  if (!document.getElementById('lb-pdf-wrap').classList.contains('active')) return;
  document.getElementById('lb-pdf-wrap').classList.remove('active');
  document.getElementById('lb-center').classList.remove('pdf-mode');
  fbPages = 0; fbPage = 0; fbBase = '';
}

function renderFlipPage(flip) {
  const img = document.getElementById('flipbook-img');
  document.getElementById('pdf-counter').textContent = (fbPage + 1) + ' / ' + fbPages;
  document.getElementById('pdf-prev').disabled = (fbPage <= 0);
  document.getElementById('pdf-next').disabled = (fbPage >= fbPages - 1);
  const src = fbBase + fbPage + '.png';
  if (flip) {
    img.classList.add('flipping');
    setTimeout(() => {
      img.src = src;
      img.onload = () => img.classList.remove('flipping');
    }, 180);
  } else {
    img.src = src;
  }
}

function flipPage(dir) {
  const next = fbPage + dir;
  if (next < 0 || next >= fbPages) return;
  fbPage = next;
  renderFlipPage(true);
}

// ─────────────────────────────────────────────
//  PROJECTS OVERLAY
// ─────────────────────────────────────────────
const PROJ_CARD_BASE = '../Assets/Cards/Card%20Videos_New/';
const spP = s => s.replace(/ /g, '%20');

const PROJECTS = [
  { id:1, name:'Narciso',            cardVideo: PROJ_CARD_BASE + 'Card_Narciso.mp4',           proyectoUrl: 'narciso.html'      },
  { id:2, name:'Casper', cardVideo: PROJ_CARD_BASE + 'Card_Casper.mp4',            proyectoUrl: null                }, // already here
  { id:3, name:'3ª Persona',         cardVideo: PROJ_CARD_BASE + 'Card_3rdPerson.mp4',         proyectoUrl: '3rdperson.html'     },
  { id:4, name:'Human Battery',     cardVideo: PROJ_CARD_BASE + 'Card_HumanBattery.mp4',      proyectoUrl: 'humanbattery.html' },
  { id:5, name:'Butter Bun',           cardVideo: PROJ_CARD_BASE + 'Card_ButterBun.mp4',                 proyectoUrl: 'butterbun.html'     },
  { id:6, name:'UFO',                cardVideo: PROJ_CARD_BASE + 'Card_UFO.mp4',               proyectoUrl: 'ufo.html'          },
  { id:7, name:'Atalaya',           cardVideo: PROJ_CARD_BASE + 'Card_Atalaya.mp4',                   proyectoUrl: 'atalaya.html'     },
  { id:8, name:'Two Toilets',       cardVideo: PROJ_CARD_BASE + spP('Card_TwoToilets.mp4'),   proyectoUrl: 'twotoilets.html'   },
];

const PROJ_N    = PROJECTS.length;
const PROJ_STEP = 360 / PROJ_N;
const PROJ_R    = Math.round((240 / 2) / Math.tan(Math.PI / PROJ_N)) + 90;

let projIdx      = 1;              // Teléfono Invisible at front
let projRotation = 1 * -PROJ_STEP;
let projBuilt    = false;

function buildProjectCarousel() {
  if (projBuilt) return;
  projBuilt = true;
  const wheel = document.getElementById('carousel-wheel');
  PROJECTS.forEach((proj, i) => {
    const card = document.createElement('div');
    card.className = 'carousel-card';
    card.dataset.idx = i;
    card.style.transform = `rotateX(${i * PROJ_STEP}deg) translateZ(${PROJ_R}px)`;

    const vid = document.createElement('video');
    vid.src = proj.cardVideo;
    vid.muted = true; vid.loop = true; vid.playsInline = true; vid.autoplay = true;

    const overlay = document.createElement('div');
    overlay.className = 'carousel-name-overlay';
    const span = document.createElement('span');
    span.textContent = proj.name.toUpperCase();
    overlay.appendChild(span);

    card.appendChild(vid); card.appendChild(overlay);

    card.addEventListener('mouseenter', () => { overlay.classList.add('visible'); });
    card.addEventListener('mouseleave', () => { overlay.classList.remove('visible'); });
    card.addEventListener('click', () => {
      if (proj.proyectoUrl === null) { closeProjects(); return; }
      if (proj.proyectoUrl) window.location.href = proj.proyectoUrl;
    });
    card.addEventListener('wheel', e => e.stopPropagation());
    wheel.appendChild(card);
  });
  document.getElementById('carousel-wheel').style.transform = `rotateX(${projRotation}deg)`;
  updateProjFront();
}

function spinProj(dir) {
  projIdx = (projIdx + dir + PROJ_N) % PROJ_N;
  projRotation -= dir * PROJ_STEP;
  document.getElementById('carousel-wheel').style.transform = `rotateX(${projRotation}deg)`;
  updateProjFront();
}

function updateProjFront() {
  document.querySelectorAll('.carousel-card').forEach((card, i) => {
    const front = (i === projIdx);
    card.classList.toggle('is-front', front);
    const diff = ((i - projIdx) % PROJ_N + PROJ_N) % PROJ_N;
    const dist = diff > PROJ_N / 2 ? PROJ_N - diff : diff;
    card.style.opacity = dist < PROJ_N / 4 ? '1' : '0';
    if (!front) {
      const v = card.querySelector('video');
      if (v) { v.pause(); v.currentTime = 0; }
      const ov = card.querySelector('.carousel-name-overlay');
      if (ov) ov.classList.remove('visible');
    }
  });
}

function openProjects() {
  buildProjectCarousel();
  document.getElementById('projects-overlay').classList.add('open');
  document.getElementById('carousel-close').style.display = 'block';
}

function closeProjects() {
  document.getElementById('projects-overlay').classList.remove('open');
  document.getElementById('carousel-close').style.display = 'none';
  document.querySelectorAll('.carousel-card video').forEach(v => {
    v.pause(); v.currentTime = 0;
  });
}

let lastProjSpin = 0;
const PROJ_SPIN_CD = 650;
document.getElementById('projects-overlay').addEventListener('wheel', e => {
  e.preventDefault();
  const now = Date.now();
  if (now - lastProjSpin < PROJ_SPIN_CD) return;
  lastProjSpin = now;
  spinProj(e.deltaY > 0 ? -1 : 1);
}, { passive: false });

// ─────────────────────────────────────────────
//  PANNING
// ─────────────────────────────────────────────
const CW = 4536, CH = 2946;
let isDrag = false, startX, startY, camX = 0, camY = 0, dragDist = 0;

window.addEventListener('load', () => {
  camX = -80; camY = -80;
  applyTransform();
  buildCanvas();
  buildCanvasVideos();
  buildFilmstrip();
  preloadAll();

  setTimeout(() => {
    const h = document.getElementById('hint');
    if (h) h.style.opacity = '0';
  }, 3000);
  setTimeout(() => {
    const h = document.getElementById('hint');
    if (h) h.style.display = 'none';
  }, 4500);

  const feed = document.getElementById('cam-feed');
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
    .then(s => { feed.srcObject = s; })
    .catch(() => {
      feed.style.display = 'none';
      document.getElementById('cam-err').style.display = 'block';
    });
});

function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

function applyTransform() {
  if (archiveView) return;
  camX = clamp(camX, -(CW - window.innerWidth),  0);
  camY = clamp(camY, -(CH - window.innerHeight), 0);
  document.getElementById('canvas').style.transform = `translate(${camX}px,${camY}px)`;
  updateMinimap();
}

function updateMinimap() {
  if (archiveView) return;
  const box = document.getElementById('minimap');
  const dot = document.getElementById('minimap-dot');
  dot.style.left = ((-camX / CW) * box.offsetWidth)  + 'px';
  dot.style.top  = ((-camY / CH) * box.offsetHeight) + 'px';
}

// Mouse panning
document.addEventListener('mousedown', e => {
  if (document.getElementById('lightbox').classList.contains('open')) return;
  if (document.getElementById('text-overlay').classList.contains('open')) return;
  if (e.target.closest('#minimap') || e.target.closest('#back-btn') ||
      e.target.closest('#archive-trigger')) return;
  isDrag = true; dragDist = 0; clickBlocked = false;
  startX = e.clientX - camX;
  startY = e.clientY - camY;
  document.body.classList.add('dragging');
});
document.addEventListener('mousemove', e => {
  if (!isDrag) return;
  const dx = e.clientX - (startX + camX);
  const dy = e.clientY - (startY + camY);
  dragDist += Math.abs(dx) + Math.abs(dy);
  if (dragDist > 4) clickBlocked = true;
  camX = e.clientX - startX;
  camY = e.clientY - startY;
  applyTransform();
});
document.addEventListener('mouseup', () => {
  isDrag = false;
  document.body.classList.remove('dragging');
  setTimeout(() => { clickBlocked = false; }, 80);
});

// Touch panning
document.addEventListener('touchstart', e => {
  const t = e.touches[0];
  isDrag = true; dragDist = 0; clickBlocked = false;
  startX = t.clientX - camX;
  startY = t.clientY - camY;
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (!isDrag) return;
  const t = e.touches[0];
  dragDist += 10; clickBlocked = true;
  camX = t.clientX - startX;
  camY = t.clientY - startY;
  applyTransform();
}, { passive: true });
document.addEventListener('touchend', () => {
  isDrag = false;
  setTimeout(() => { clickBlocked = false; }, 80);
});

// Trackpad / scroll wheel panning
document.addEventListener('wheel', e => {
  if (document.getElementById('lightbox').classList.contains('open')) return;
  if (document.getElementById('text-overlay').classList.contains('open')) return;
  if (document.getElementById('projects-overlay').classList.contains('open')) return;
  if (e.ctrlKey) return;
  e.preventDefault();
  camX -= e.deltaX;
  camY -= e.deltaY;
  applyTransform();
}, { passive: false });

// Keyboard panning
const keys = {};
const KS = 42;
(function keyLoop() {
  if (!document.getElementById('lightbox').classList.contains('open') &&
      !document.getElementById('text-overlay').classList.contains('open')) {
    if (keys['ArrowLeft'])  camX += KS;
    if (keys['ArrowRight']) camX -= KS;
    if (keys['ArrowUp'])    camY += KS;
    if (keys['ArrowDown'])  camY -= KS;
    if (Object.values(keys).some(Boolean)) applyTransform();
  }
  requestAnimationFrame(keyLoop);
})();
</script>
